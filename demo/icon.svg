<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="ألسُن">
  <!-- Square app-icon for Alsun (ألسُن).
       Aesthetic cue: Routledge "Grammar Workbooks" cover —
       charcoal ground, olive angular arrows, bold white wordmark. -->
  <defs>
    <clipPath id="tile"><rect width="1024" height="1024"/></clipPath>
  </defs>
  <g clip-path="url(#tile)">
    <!-- Charcoal ground -->
    <rect width="1024" height="1024" fill="#1A1A1A"/>

    <!-- Large olive triangle converging from top-right corner -->
    <path d="M1024,0 L1024,560 L560,260 Z" fill="#B5B06A"/>
    <!-- Secondary olive triangle from bottom-right -->
    <path d="M1024,1024 L1024,700 L640,900 Z" fill="#B5B06A"/>

    <!-- Stacked chevron ticks along the right edge -->
    <g fill="#B5B06A">
      <path d="M948,80 l52,0 l-26,38 Z"/>
      <path d="M948,136 l52,0 l-26,38 Z"/>
      <path d="M948,192 l52,0 l-26,38 Z"/>
    </g>

    <!-- Wordmark — centered, bold white -->
    <text x="512" y="640" fill="#FFFFFF" text-anchor="middle"
          font-family="'SF Arabic Rounded','SF Arabic','Geeza Pro','Noto Naskh Arabic',system-ui,sans-serif"
          font-weight="800" font-size="360" direction="rtl">ألسُن</text>

    <!-- Olive accent bar under wordmark -->
    <rect x="332" y="712" width="360" height="16" rx="8" fill="#B5B06A"/>
  </g>
</svg>
