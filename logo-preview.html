<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<title>ألسُن — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0F172A;
    padding: 80px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 80px;
  }
  .label {
    font-family: monospace; font-size: 10px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: #1E3A5F; margin-bottom: 40px;
  }
  .row { display: flex; align-items: center; justify-content: center; gap: 48px; flex-wrap: wrap; }
  .section { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }

  .logo-text {
    font-family: 'Noto Naskh Arabic', serif;
    font-weight: 900;
    direction: rtl;
    line-height: 1;
  }
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.04 0.06" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="blob" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="blob-soft" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="4" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- ════════ 1 — BLOB BEHIND TEXT (like the website bubbles) ════════ -->
<div class="section">
  <div class="label">Blob · same as hero</div>
  <div class="row">

    <!-- Blue blob -->
    <div style="position:relative;width:280px;height:200px;display:flex;align-items:center;justify-content:center;">
      <div style="position:absolute;inset:0;filter:url(#blob);">
        <div style="width:100%;height:100%;background:#3B82F6;border-radius:50%;"></div>
      </div>
      <div style="position:relative;z-index:1;filter:url(#ink);">
        <div class="logo-text" style="font-size:82px;color:#fff;">ألسُن</div>
      </div>
    </div>

    <!-- Amber blob -->
    <div style="position:relative;width:280px;height:200px;display:flex;align-items:center;justify-content:center;">
      <div style="position:absolute;inset:0;filter:url(#blob);">
        <div style="width:100%;height:100%;background:#F59E0B;border-radius:50%;"></div>
      </div>
      <div style="position:relative;z-index:1;filter:url(#ink);">
        <div class="logo-text" style="font-size:82px;color:#111827;">ألسُن</div>
      </div>
    </div>

    <!-- Dark blob -->
    <div style="position:relative;width:280px;height:200px;display:flex;align-items:center;justify-content:center;">
      <div style="position:absolute;inset:0;filter:url(#blob);">
        <div style="width:100%;height:100%;background:#111827;border-radius:50%;"></div>
      </div>
      <div style="position:relative;z-index:1;filter:url(#ink);">
        <div class="logo-text" style="font-size:82px;color:#F59E0B;">ألسُن</div>
      </div>
    </div>

  </div>
</div>

<!-- ════════ 2 — SQUARE ICON ════════ -->
<div class="section">
  <div class="label">App icon</div>
  <div class="row" style="align-items:flex-end;">

    <!-- Blue blob on white card -->
    <div style="width:200px;height:200px;background:#fff;border-radius:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 48px rgba(0,0,0,.2);overflow:hidden;">
      <div style="position:relative;width:180px;height:170px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:0;filter:url(#blob-soft);">
          <div style="width:100%;height:100%;background:#3B82F6;border-radius:50%;"></div>
        </div>
        <div style="position:relative;z-index:1;filter:url(#ink);">
          <div class="logo-text" style="font-size:74px;color:#fff;">ألسُن</div>
        </div>
      </div>
    </div>

    <!-- Full blue icon -->
    <div style="width:200px;height:200px;background:#3B82F6;border-radius:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 48px rgba(59,130,246,.4);overflow:hidden;">
      <div style="position:relative;width:180px;height:170px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:0;filter:url(#blob-soft);">
          <div style="width:100%;height:100%;background:rgba(0,0,0,.18);border-radius:50%;"></div>
        </div>
        <div style="position:relative;z-index:1;filter:url(#ink);">
          <div class="logo-text" style="font-size:74px;color:#fff;">ألسُن</div>
        </div>
      </div>
    </div>

    <!-- Amber blob on dark icon -->
    <div style="width:200px;height:200px;background:#111827;border-radius:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 48px rgba(0,0,0,.4);overflow:hidden;">
      <div style="position:relative;width:180px;height:170px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:0;filter:url(#blob-soft);">
          <div style="width:100%;height:100%;background:#F59E0B;border-radius:50%;"></div>
        </div>
        <div style="position:relative;z-index:1;filter:url(#ink);">
          <div class="logo-text" style="font-size:74px;color:#111827;">ألسُن</div>
        </div>
      </div>
    </div>

    <!-- Small sizes -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center;">
      <div style="width:120px;height:120px;background:#fff;border-radius:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,0,0,.16);overflow:hidden;">
        <div style="position:relative;width:110px;height:100px;display:flex;align-items:center;justify-content:center;">
          <div style="position:absolute;inset:0;filter:url(#blob-soft);"><div style="width:100%;height:100%;background:#3B82F6;border-radius:50%;"></div></div>
          <div style="position:relative;z-index:1;"><div class="logo-text" style="font-size:44px;color:#fff;">ألسُن</div></div>
        </div>
      </div>
      <div style="width:72px;height:72px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.14);overflow:hidden;">
        <div style="position:relative;width:66px;height:60px;display:flex;align-items:center;justify-content:center;">
          <div style="position:absolute;inset:0;filter:url(#blob-soft);"><div style="width:100%;height:100%;background:#3B82F6;border-radius:50%;"></div></div>
          <div style="position:relative;z-index:1;"><div class="logo-text" style="font-size:27px;color:#fff;">ألسُن</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ════════ 3 — ON AMBER BG (website header use) ════════ -->
<div class="section">
  <div class="label">On amber · website nav &amp; hero</div>
  <div style="background:#F59E0B;border-radius:28px;padding:48px 80px;display:flex;flex-direction:column;align-items:center;gap:40px;width:100%;">
    <div class="row">
      <!-- Large hero -->
      <div style="position:relative;width:320px;height:220px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:0;filter:url(#blob);">
          <div style="width:100%;height:100%;background:#3B82F6;border-radius:50%;"></div>
        </div>
        <div style="position:relative;z-index:1;filter:url(#ink);">
          <div class="logo-text" style="font-size:90px;color:#fff;">ألسُن</div>
        </div>
      </div>
      <!-- Nav pill on amber -->
      <div style="background:#111827;border-radius:999px;padding:12px 28px;filter:url(#ink);">
        <div class="logo-text" style="font-size:32px;color:#fff;">ألسُن</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
